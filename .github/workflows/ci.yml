name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest -p no:cacheprovider -q
      - run: python -m ruff check .
        if: matrix.python-version == '3.12'
      - run: node --check evidentloop/renderers/static/audit.js
        if: matrix.python-version == '3.12'
      - run: node tests/js/audit-feedback.test.cjs
        if: matrix.python-version == '3.12'
      - name: Build distributions and check release boundaries
        if: matrix.python-version == '3.12'
        run: |
          python -m build --outdir /tmp/evidentloop-dist
          mkdir -p /tmp/evidentloop-skill
          cp -R skills/evidentloop /tmp/evidentloop-skill/evidentloop
          python scripts/check_release_boundaries.py \
            --dist-dir /tmp/evidentloop-dist \
            --skill-dir /tmp/evidentloop-skill/evidentloop
          python -m venv /tmp/evidentloop-wheel-smoke
          /tmp/evidentloop-wheel-smoke/bin/python -m pip install /tmp/evidentloop-dist/*.whl
          cd /tmp
          /tmp/evidentloop-wheel-smoke/bin/python -m evidentloop --help
          /tmp/evidentloop-wheel-smoke/bin/evidentloop --help
          /tmp/evidentloop-wheel-smoke/bin/evidentloop doctor --json
          /tmp/evidentloop-wheel-smoke/bin/evidentloop demo --out /tmp/evidentloop-demo-smoke
