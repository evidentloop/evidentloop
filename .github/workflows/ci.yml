name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest -p no:cacheprovider -q
      - run: python -m ruff check .
        if: matrix.python-version == '3.12'
      - run: node --check change_audit/renderers/static/audit.js
        if: matrix.python-version == '3.12'
      - run: node tests/js/audit-feedback.test.cjs
        if: matrix.python-version == '3.12'
      - name: Build and install wheel
        if: matrix.python-version == '3.12'
        run: |
          python -m build --wheel --outdir /tmp/change-audit-dist
          python -m venv /tmp/change-audit-wheel-smoke
          /tmp/change-audit-wheel-smoke/bin/python -m pip install /tmp/change-audit-dist/*.whl
          cd /tmp
          /tmp/change-audit-wheel-smoke/bin/python -m change_audit --help
