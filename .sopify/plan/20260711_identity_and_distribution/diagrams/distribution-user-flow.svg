<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" width="1280" height="760" role="img" aria-labelledby="title desc">
  <title id="title">EvidentLoop 候选用户路径与证据闭环</title>
  <desc id="desc">身份门禁通过后方可实施的后续 Wave 候选目标态：从在线报告、replay demo、CLI 与 Skill 安装，到宿主模型审查、正式审计产物和 audit-evidence 发布证据的完整流程。</desc>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { fill: #111827; font-size: 24px; font-weight: 700; }
    .subtitle { fill: #6b7280; font-size: 13px; }
    .lane-title { fill: #374151; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; }
    .node-title { fill: #111827; font-size: 15px; font-weight: 650; }
    .node-sub { fill: #6b7280; font-size: 11px; }
    .icon-label { fill: #ffffff; font-size: 10px; font-weight: 700; }
    .arrow-label { fill: #4b5563; font-size: 11px; font-weight: 600; }
    .legend { fill: #4b5563; font-size: 11px; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1280" height="760" fill="#ffffff"/>
  <text x="48" y="42" class="title">EvidentLoop 候选用户路径与证据闭环</text>
  <text x="48" y="66" class="subtitle">身份门禁通过后方可实施的后续 Wave 目标态 · main / PyPI / Skill 为目标交付面</text>
  <rect x="1062" y="30" width="168" height="32" rx="16" fill="#f0fdfa" stroke="#99f6e4"/>
  <text x="1146" y="51" text-anchor="middle" fill="#0f766e" font-size="12" font-weight="700">v0 · Git diff only</text>

  <rect x="40" y="92" width="1200" height="164" rx="12" fill="#eff6ff" fill-opacity="0.62" stroke="#bfdbfe" stroke-width="1.5" data-graph-role="container"/>
  <text x="60" y="119" class="lane-title">01 发现与安装</text>
  <rect x="40" y="292" width="1200" height="258" rx="12" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5" data-graph-role="container"/>
  <text x="60" y="319" class="lane-title">02 真实审计</text>
  <rect x="40" y="582" width="1200" height="116" rx="12" fill="#f0fdf4" fill-opacity="0.72" stroke="#bbf7d0" stroke-width="1.5" data-graph-role="container"/>
  <text x="60" y="609" class="lane-title">03 发布证据 · RELEASE / DOGFOOD ONLY</text>

  <!-- Primary user path -->
  <path d="M 300 181 L 350 181" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <path d="M 570 181 L 620 181" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <path d="M 840 181 L 890 181" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <path d="M 1000 226 L 1000 270 L 160 270 L 160 365" fill="none" stroke="#2563eb" stroke-width="2.2" stroke-linejoin="round" marker-end="url(#arrow-blue)"/>
  <path d="M 240 415 L 290 415" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <path d="M 480 415 L 530 415" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <path d="M 720 415 L 770 415" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <path d="M 960 415 L 1010 415" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>

  <!-- Evidence publication loop -->
  <path d="M 1105 465 L 1105 650 L 1010 650" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="7 4" stroke-linejoin="round" marker-end="url(#arrow-green)"/>
  <path d="M 760 650 L 22 650 L 22 181 L 80 181" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="7 4" stroke-linejoin="round" marker-end="url(#arrow-green)"/>

  <!-- Arrow labels -->
  <text x="325" y="169" text-anchor="middle" class="arrow-label">试用</text>
  <text x="595" y="169" text-anchor="middle" class="arrow-label">安装</text>
  <text x="865" y="169" text-anchor="middle" class="arrow-label">接入</text>
  <text x="265" y="403" text-anchor="middle" class="arrow-label">冻结输入</text>
  <text x="505" y="403" text-anchor="middle" class="arrow-label">宿主审查</text>
  <text x="745" y="403" text-anchor="middle" class="arrow-label">写回结果</text>
  <text x="985" y="403" text-anchor="middle" class="arrow-label">产出</text>
  <text x="1060" y="638" text-anchor="middle" fill="#15803d" font-size="11" font-weight="600">精选 · 脱敏</text>

  <!-- Discovery and installation nodes -->
  <g>
    <rect x="80" y="136" width="220" height="90" rx="10" fill="#ffffff" stroke="#93c5fd" stroke-width="1.6"/>
    <rect x="96" y="156" width="42" height="42" rx="9" fill="#2563eb"/>
    <text x="117" y="182" text-anchor="middle" class="icon-label">WEB</text>
    <text x="154" y="171" class="node-title">在线报告</text>
    <text x="154" y="193" class="node-sub">GitHub Pages</text>
  </g>
  <g>
    <rect x="350" y="136" width="220" height="90" rx="10" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.6"/>
    <rect x="366" y="156" width="42" height="42" rx="9" fill="#7c3aed"/>
    <text x="387" y="182" text-anchor="middle" class="icon-label">DEMO</text>
    <text x="424" y="171" class="node-title">replay demo</text>
    <text x="424" y="193" class="node-sub">uvx evidentloop demo</text>
  </g>
  <g>
    <rect x="620" y="136" width="220" height="90" rx="10" fill="#ffffff" stroke="#93c5fd" stroke-width="1.6"/>
    <rect x="636" y="156" width="42" height="42" rx="9" fill="#2563eb"/>
    <text x="657" y="182" text-anchor="middle" class="icon-label">CLI</text>
    <text x="694" y="171" class="node-title">安装 CLI</text>
    <text x="694" y="193" class="node-sub">uv tool install evidentloop</text>
  </g>
  <g>
    <rect x="890" y="136" width="220" height="90" rx="10" fill="#ffffff" stroke="#fdba74" stroke-width="1.6"/>
    <rect x="906" y="156" width="42" height="42" rx="9" fill="#ea580c"/>
    <text x="927" y="182" text-anchor="middle" class="icon-label">SK</text>
    <text x="964" y="171" class="node-title">安装 Skill</text>
    <text x="964" y="193" class="node-sub">标准 skills CLI</text>
  </g>

  <!-- Real audit nodes -->
  <g>
    <rect x="80" y="365" width="160" height="100" rx="10" fill="#ffffff" stroke="#5eead4" stroke-width="1.6"/>
    <circle cx="111" cy="397" r="11" fill="#0d9488"/>
    <path d="M 94 434 Q 94 411 111 411 Q 128 411 128 434" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.4"/>
    <text x="145" y="402" class="node-title">一句话审计</text>
    <text x="145" y="424" class="node-sub">staged changes</text>
    <text x="160" y="451" text-anchor="middle" fill="#0f766e" font-size="10" font-weight="600">AI HOST</text>
  </g>
  <g>
    <rect x="290" y="365" width="190" height="100" rx="10" fill="#ffffff" stroke="#93c5fd" stroke-width="1.6"/>
    <rect x="307" y="389" width="38" height="38" rx="8" fill="#2563eb"/>
    <text x="326" y="413" text-anchor="middle" class="icon-label">P</text>
    <text x="360" y="402" class="node-title">prepare</text>
    <text x="360" y="424" class="node-sub">冻结 diff + prompt</text>
    <text x="385" y="451" text-anchor="middle" fill="#1d4ed8" font-size="10" font-weight="600">DETERMINISTIC</text>
  </g>
  <g>
    <rect x="530" y="365" width="190" height="100" rx="10" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.6"/>
    <rect x="547" y="389" width="38" height="38" rx="8" fill="#7c3aed"/>
    <text x="566" y="413" text-anchor="middle" class="icon-label">AI</text>
    <text x="600" y="402" class="node-title">宿主 reviewer</text>
    <text x="600" y="424" class="node-sub">真实语义审查</text>
    <text x="625" y="451" text-anchor="middle" fill="#6d28d9" font-size="10" font-weight="600">ISOLATE WHEN AVAILABLE</text>
  </g>
  <g>
    <rect x="770" y="365" width="190" height="100" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="1.6"/>
    <rect x="787" y="389" width="38" height="38" rx="8" fill="#16a34a"/>
    <text x="806" y="413" text-anchor="middle" class="icon-label">F</text>
    <text x="840" y="402" class="node-title">finalize</text>
    <text x="840" y="424" class="node-sub">校验 + 归一化</text>
    <text x="865" y="451" text-anchor="middle" fill="#15803d" font-size="10" font-weight="600">FAIL CLOSED</text>
  </g>
  <g>
    <rect x="1010" y="365" width="190" height="100" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="1.6"/>
    <path d="M 1028 388 L 1056 388 L 1067 399 L 1067 431 L 1028 431 Z" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4"/>
    <path d="M 1056 388 L 1056 399 L 1067 399" fill="none" stroke="#16a34a" stroke-width="1.2"/>
    <text x="1080" y="402" class="node-title">正式产物</text>
    <text x="1080" y="424" class="node-sub">audit.json + audit.html</text>
    <text x="1105" y="451" text-anchor="middle" fill="#15803d" font-size="10" font-weight="600">TRACEABLE</text>
  </g>

  <!-- Evidence bundle node -->
  <g>
    <rect x="760" y="620" width="250" height="60" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="1.6"/>
    <rect x="777" y="632" width="38" height="36" rx="7" fill="#16a34a"/>
    <text x="796" y="655" text-anchor="middle" class="icon-label">E</text>
    <text x="830" y="645" class="node-title">release evidence bundle</text>
    <text x="830" y="665" class="node-sub">audit pair · manifest · checksums</text>
  </g>

  <!-- Legend -->
  <line x1="48" y1="729" x2="78" y2="729" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="88" y="733" class="legend">用户主路径</text>
  <line x1="205" y1="729" x2="235" y2="729" stroke="#16a34a" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arrow-green)"/>
  <text x="245" y="733" class="legend">发布证据闭环</text>
  <text x="1232" y="733" text-anchor="end" fill="#9ca3af" font-size="10">audit-evidence 不参与普通用户运行</text>
</svg>
