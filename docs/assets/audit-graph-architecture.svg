<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-labelledby="title desc">
  <title id="title">audit-graph architecture</title>
  <desc id="desc">Inputs are normalized by adapters into audit.json, then rendered into human and machine artifacts with feedback exported as JSONL for later audit runs.</desc>
  <style>
    text {
      font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      fill: #111827;
    }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .section { font-size: 13px; font-weight: 700; fill: #374151; }
    .node-title { font-size: 14px; font-weight: 700; }
    .node-subtitle { font-size: 11.5px; fill: #6b7280; }
    .label { font-size: 11px; font-weight: 600; fill: #374151; }
    .legend-text { font-size: 11px; fill: #6b7280; }
    .container { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1.5; stroke-dasharray: 7 5; rx: 12; }
    .node { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 8; }
    .input { fill: #eff6ff; stroke: #bfdbfe; }
    .adapter { fill: #f0fdfa; stroke: #99f6e4; }
    .graph { fill: #fff7ed; stroke: #fed7aa; }
    .renderer { fill: #f0fdf4; stroke: #bbf7d0; }
    .feedback { fill: #faf5ff; stroke: #ddd6fe; }
    .flow { fill: none; stroke: #2563eb; stroke-width: 2; marker-end: url(#arrow-blue); }
    .optional { fill: none; stroke: #6b7280; stroke-width: 1.7; stroke-dasharray: 6 4; marker-end: url(#arrow-gray); }
    .feedback-line { fill: none; stroke: #7c3aed; stroke-width: 2; marker-end: url(#arrow-purple); }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="48" y="42" class="title">audit-graph architecture</text>
  <text x="48" y="64" class="subtitle">Renderer-first audit artifacts for AI-generated code changes</text>

  <!-- ═══ INPUTS ═══ -->
  <rect x="24" y="90" width="222" height="340" class="container"/>
  <text x="44" y="114" class="section">Inputs</text>

  <rect x="44" y="140" width="182" height="64" class="node input"/>
  <text x="66" y="168" class="node-title">Git diff</text>
  <text x="66" y="188" class="node-subtitle">HEAD, staged, worktree</text>

  <rect x="44" y="234" width="182" height="64" class="node input"/>
  <text x="66" y="262" class="node-title">CrossReview</text>
  <text x="66" y="282" class="node-subtitle">ReviewResult JSON</text>

  <rect x="44" y="328" width="182" height="64" class="node input"/>
  <text x="66" y="356" class="node-title">Evidence</text>
  <text x="66" y="376" class="node-subtitle">test, lint, scan</text>

  <!-- ═══ ADAPTERS ═══ -->
  <rect x="290" y="90" width="222" height="340" class="container"/>
  <text x="310" y="114" class="section">Adapters</text>

  <rect x="310" y="140" width="182" height="64" class="node adapter"/>
  <text x="332" y="168" class="node-title">gitdiff adapter</text>
  <text x="332" y="188" class="node-subtitle">files + hunk snippets</text>

  <rect x="310" y="234" width="182" height="64" class="node adapter"/>
  <text x="332" y="262" class="node-title">review adapter</text>
  <text x="332" y="282" class="node-subtitle">findings + severity</text>

  <rect x="310" y="328" width="182" height="64" class="node adapter"/>
  <text x="332" y="356" class="node-title">evidence adapter</text>
  <text x="332" y="376" class="node-subtitle">deterministic signals</text>

  <!-- ═══ AUDIT GRAPH ═══ -->
  <rect x="556" y="160" width="200" height="200" class="container"/>
  <text x="576" y="184" class="section">Typed Audit Graph</text>

  <rect x="586" y="210" width="140" height="100" class="node graph"/>
  <text x="618" y="248" class="node-title">audit.json</text>
  <text x="610" y="270" class="node-subtitle">single truth source</text>
  <text x="610" y="290" class="node-subtitle">nodes + edges</text>

  <!-- ═══ RENDERERS ═══ -->
  <rect x="800" y="90" width="376" height="340" class="container"/>
  <text x="820" y="114" class="section">Renderers</text>

  <rect x="830" y="140" width="260" height="64" class="node renderer"/>
  <text x="856" y="168" class="node-title">audit.html</text>
  <text x="856" y="188" class="node-subtitle">human audit view + hunk cards</text>

  <rect x="830" y="234" width="260" height="64" class="node renderer"/>
  <text x="856" y="262" class="node-title">audit-graph.svg</text>
  <text x="856" y="282" class="node-subtitle">optional overview graph</text>

  <rect x="830" y="328" width="260" height="64" class="node renderer"/>
  <text x="856" y="356" class="node-title">Markdown export</text>
  <text x="856" y="376" class="node-subtitle">PR, issue, chat summaries</text>

  <!-- ═══ FEEDBACK ═══ -->
  <rect x="370" y="496" width="468" height="130" class="container"/>
  <text x="390" y="520" class="section">Feedback capture</text>

  <rect x="400" y="546" width="170" height="48" class="node feedback"/>
  <text x="435" y="576" class="node-title">localStorage</text>

  <rect x="626" y="546" width="184" height="48" class="node feedback"/>
  <text x="648" y="576" class="node-title">audit-feedback.jsonl</text>

  <!-- ═══ PRIMARY FLOW ARROWS ═══ -->
  <path d="M226 172 L310 172" class="flow"/>
  <path d="M226 266 L310 266" class="flow"/>
  <path d="M226 360 L310 360" class="flow"/>

  <path d="M492 172 C530 172 540 252 586 252" class="flow"/>
  <path d="M492 266 L586 266" class="flow"/>
  <path d="M492 360 C530 360 540 278 586 278" class="flow"/>

  <path d="M726 240 L830 172" class="flow"/>
  <path d="M726 260 L830 266" class="optional"/>
  <path d="M726 280 L830 360" class="optional"/>

  <!-- ═══ FEEDBACK ARROWS ═══ -->
  <!-- audit.html → right outside renderers → down → left → down to localStorage (no crossing) -->
  <path d="M1090 172 L1186 172 L1186 456 L485 456 L485 546" class="feedback-line"/>
  <!-- localStorage right to JSONL -->
  <path d="M570 570 L626 570" class="feedback-line"/>
  <!-- JSONL up to audit.json bottom center (vertical, outside all containers) -->
  <path d="M718 546 L718 330 L656 330 L656 310" class="feedback-line"/>

  <!-- ═══ LABELS ═══ -->
  <text x="250" y="158" class="label">extract</text>
  <text x="522" y="232" class="label">normalize</text>
  <text x="758" y="218" class="label">render</text>
  <text x="950" y="446" class="label">user decisions</text>
  <text x="620" y="440" class="label">v0.1 consume later</text>

  <!-- ═══ LEGEND ═══ -->
  <g transform="translate(48, 660)">
    <line x1="0" y1="8" x2="32" y2="8" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="42" y="12" class="legend-text">primary artifact flow</text>
    <line x1="220" y1="8" x2="252" y2="8" stroke="#6b7280" stroke-width="1.7" stroke-dasharray="6 4" marker-end="url(#arrow-gray)"/>
    <text x="262" y="12" class="legend-text">optional export</text>
    <line x1="400" y1="8" x2="432" y2="8" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
    <text x="442" y="12" class="legend-text">feedback loop</text>
  </g>
</svg>
