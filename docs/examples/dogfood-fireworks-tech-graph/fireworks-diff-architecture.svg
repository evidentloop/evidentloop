<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-labelledby="ftg-title ftg-desc">
  <title id="ftg-title">Fireworks Tech Graph 本次 diff 的校验架构与审计结论</title>
  <desc id="ftg-desc">本次变更把 SVG 校验集中到 Python 内核，覆盖 XML、marker 与碰撞检查，并增加回归测试；审计发现几何语义覆盖和回归状态传递仍有缺口。</desc>
