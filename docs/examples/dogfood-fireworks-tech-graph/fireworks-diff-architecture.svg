    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { fill: #111827; font-size: 24px; font-weight: 700; }
    .subtitle { fill: #6b7280; font-size: 13px; }
    .group-title { fill: #374151; font-size: 14px; font-weight: 700; }
    .node-title { fill: #111827; font-size: 14px; font-weight: 700; }
    .node-sub { fill: #6b7280; font-size: 12px; }
    .small { fill: #4b5563; font-size: 11px; }
    .audit-title { fill: #991b1b; font-size: 15px; font-weight: 700; }
    .audit-text { fill: #7f1d1d; font-size: 12px; }
  </style>
